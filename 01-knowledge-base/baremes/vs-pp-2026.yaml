    Art. 32 al. 1 : "fixé entre 2% et 14% selon la classe de revenu, conformément au tableau
    de l'annexe 1". Les tranches hautes (>152'400) étaient tronquées dans le chunk ingéré (S33).
    S36 : interpolation linéaire ajoutée entre 139'800 et 755'200 CHF (dette partiellement résolue).
    Source officielle exacte non récupérable (lex.vs.ch SPA, vs.ch Cloudflare-protégé).
    Taux de 14% confirmé comme maximum légal par le texte de loi (art. 32 al. 1 LF VS).
    Confidence reste medium — confirmer avec Guide PP VS 2026 ou SCC VS.

# Art. 32a — Tarif marié (personnes mariées vivant en ménage commun)
# Source : LF VS art. 32a + Guide PP VS 2024 section 86
# Méthode VS : réduction de 35% de l'impôt de base, avec min/max CHF (rabais conjugal)
tarif_married:
  methode: rabais_conjugal_35pct
  rule: >
    Art. 32a LF VS : les époux vivant en ménage commun bénéficient d'une réduction de
    35% de l'impôt cantonal de base calculé sur le barème art. 32, avec un minimum
    de 680 CHF et un maximum de 4'870 CHF.
    Calcul : impôt_base × (1 - 0.35), plafonné entre 680 et 4870 CHF de réduction.
  reduction_pct: 35
  min_reduction_chf: 680
  max_reduction_chf: 4870
  source: "Guide PP VS 2024, section 86 — art. 32a LF VS"
  source_confidence: medium
  note: >
    Dette S35 partiellement résolue S36. La règle du rabais conjugal est confirmée.
    Les montants exacts min/max 2026 peuvent être indexés (indexation annuelle VS).
    Approximation 2026 basée sur données 2024 — confirmer avec Guide PP VS 2026 officiel.

# Réductions / déductions fiscales spécifiques
deductions:
  charge_famille:
    reduction_par_enfant_max_chf: 2435
    reduction_pct: 2
    source: "Guide PP VS 2024, section 91 — art. 33b al. 4 LF VS"

frais_professionnels:
  pourcentage: 0.025
  min_chf: 2000
  max_chf: 4000
  note: "Approximation basée sur pratique VS ; confirmer avec Guide PP officiel 2026"
  confidence: low

# Note sur la structure fiscale VS
note_fiscale: >
  En Valais, l'impôt cantonal PP est calculé sur la base du barème de l'annexe 1 de la LF VS.
  Les communes fixent leur propre coefficient (centimes additionnels) sur ce même barème.
  Le taux communal varie de 70% à 130% environ selon la commune.
  L'impôt communal a son propre barème (Art. 178 LF VS, max 10%).
