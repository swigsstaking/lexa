# Note fiscale FR PM
note_fiscale: >
  Fribourg PM : taux bénéfice 4% (cantonal) — parmi les plus élevés de Suisse romande post-RFFA.
  Taux ICC total FR PM (cantonal + IFD) ≈ 12.5% pour SA standard.
  Capital standard : 1‰ (confirmé pour associations/fondations ; SA/Sàrl à confirmer).
  Taux réduit participations : 0.1‰ (très favorable pour holdings).
  Les communes fribourgeoises perçoivent leurs propres centimes additionnels sur PM.
