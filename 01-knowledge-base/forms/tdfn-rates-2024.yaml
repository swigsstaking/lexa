# Lexa — Taux de la dette fiscale nette (TDFN) par secteur d'activité
#
# Extraits de l'Info TVA 12 de l'AFC, version 2024 (révision 2023-09 suite
# à l'ajustement des taux 7.7 → 8.1).
#
# Liste NON EXHAUSTIVE — session 13 v1 : les 20 secteurs les plus fréquents
# pour une première ingestion. Session 14+ : extraction programmatique
# complète depuis les sections AFC-INFO_TVA_12_TDFN ingérées dans Qdrant
# (5388 points).
#
# Format : code (identifiant Lexa) + label (intitulé officiel AFC) + rate (%).

version: "2024-01-01"
authority: AFC
source_circular: "Info TVA 12 — Taux de la dette fiscale nette applicables"
source_qdrant_prefix: "AFC-INFO_TVA_12_TDFN"

