<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F5F2EC" />
    <title>Lexa · Comptabilité IA suisse</title>
    <!-- SEO meta tags — BUG-T02 -->
    <meta name="description" content="Lexa — Comptabilité IA suisse 100% locale. Déclarations fiscales, TVA, clôture continue pour indépendants, PME, fiduciaires." />
    <meta name="keywords" content="comptabilité suisse, IA, fiscalité, fiduciaire, TVA, déclaration" />
    <link rel="canonical" href="https://lexa.swigs.online/" />
    <meta property="og:title" content="Lexa · Comptabilité IA suisse" />
    <meta property="og:description" content="Comptabilité pilotée par IA locale, pour la Suisse." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Theme init : lit localStorage avant React pour éviter le flash dark/light -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('lexa:theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
