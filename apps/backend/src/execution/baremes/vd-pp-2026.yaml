# Système VD : quotient familial (art. 43)
# Célibataire : 1 part / Marié sans enfant : 1.5 parts / +0.5 par enfant
tarif_base:
  structure: progressif_par_tranche
  methode: quotient_familial
  note: >
    VD utilise le quotient familial : revenu imposable / nombre de parts = revenu déterminant taux.
    Impôt = taux(revenu déterminant) × revenu imposable.
  # Taux d'imposition de base (impôt annuel de base — coefficient 155% en 2025/2026 env.)
  # Tranches sur revenu déterminant (après quotient)
  tranches:
    - threshold: 0
      threshold_max: 14300
      rate: 0.0000
