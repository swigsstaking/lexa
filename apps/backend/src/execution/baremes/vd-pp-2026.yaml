# Note fiscale VD PP
note_fiscale: >
  Vaud utilise le système du quotient familial pour adapter le taux selon la situation familiale.
  L'impôt de base est multiplié par le coefficient annuel (loi de finances VD).
  Taux effectif ICC PP VD pour revenu 80k célibataire : ~10-11% (cantonal seul, avant communal).
  Les communes vaudoises perçoivent leurs propres centimes additionnels (LIPC — BLV 650.11).
