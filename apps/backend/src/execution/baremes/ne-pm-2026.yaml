# Sociétés de capitaux et coopératives (SA, Sàrl, SC)
impot_benefice:
  structure: flat
  rate: 0.165
  description: "16.5% du bénéfice net imposable (ICC cantonal + communal moyen NE)"
  source_article: "LCdir RSN 631.0 — taux bénéfice PM"
  confidence: medium

  associations_fondations:
    structure: flat
    rate: 0.165
    description: "16.5% du bénéfice net — même barème, exonération si < CHF 20'000"
    seuil_exoneration_chf: 20000
    source_article: "LCdir RSN 631.0 — exonération associations/fondations"
    note: "Associations d'utilité publique exonérées si bénéfice net < CHF 20'000"

impot_capital:
  standard:
    structure: flat
    rate_permille: 0.45
    description: "0.45‰ des fonds propres imposables (capital + réserves)"
    source_article: "LCdir RSN 631.0 — taux capital PM"
    confidence: medium
    note: >
      Taux capital 0.45‰ — parmi les plus compétitifs de Suisse romande pour les PM.
      Les communes NE peuvent percevoir leurs propres centimes additionnels sur l'impôt capital.

# IFD fédéral (rappel — non géré dans ce YAML, calculé séparément)
ifd_federal:
  rate: 0.085
  description: "8.5% flat du bénéfice net imposable"
  source: "Art. 68 LIFD RS 642.11 — taux unique sans progressivité pour PM"

# Déductions et régimes spéciaux
deductions:
  report_pertes_ans: 7
  deduction_rd_pct: 150
  patent_box: true
  beteiligungsabzug: true
  note: >
    Report de pertes 7 ans (harmonisation LIFD), déduction R&D 150% (RFFA 2020),
    patent box sur brevets et droits comparables, déduction pour participations ≥ 10%.

# Note fiscale NE PM
note_fiscale: >
  Neuchâtel PM : taux bénéfice ICC ~16.5% (cantonal + commune moyen) — fourchette intermédiaire haute.
  Taux effectif global estimé (ICC + IFD) : ~25% pour une SA/Sàrl standard NE.
  Impôt capital 0.45‰ — très compétitif vs autres cantons romands.
  NE attire les industries watchmaking, medtech, fintech grâce à son tissu industriel historique.
  Impôt minimum cantonal PM : CHF 100.
  Estimation indicative — confirmer avec SCCO NE ou fiduciaire agréé.
