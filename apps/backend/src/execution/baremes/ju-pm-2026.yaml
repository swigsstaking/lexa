# Barème ICC Jura — Personnes Morales 2026
# Source : Loi d'impôt du canton du Jura (LI-JU — RSJU 641.11)
#   - Taux ICC PM bénéfice : 15.5% (cantonal + commune inclus)
#   - Taux ICC PM capital : 0.50‰ des fonds propres imposables
#   - IFD : 8.5% flat fédéral (art. 68 LIFD RS 642.11) — non inclus dans ICC
# Ingéré dans Qdrant : Bareme-JU-PM-2026

canton: JU
year: 2026
entity: PM
source:
  authority: "Service cantonal des contributions du Jura (SCCJ)"
  law: "Loi d'impôt du canton du Jura (LI-JU — RSJU 641.11)"
  articles:
    - "LI-JU RSJU 641.11 — Impôt bénéfice PM (SA/Sàrl/SC) cantonal + communal"
    - "LI-JU RSJU 641.11 — Impôt capital PM (SA/Sàrl/SC)"
    - "LI-JU RSJU 641.11 — Exonération associations/fondations d'utilité publique"
  url: "https://rsju.jura.ch/fr/viewdocument.html?idn=20222&id=41099"
  document: "LI-JU RSJU 641.11 — Impôts PM bénéfice et capital"
  fetched_at: "2026-04-21"
