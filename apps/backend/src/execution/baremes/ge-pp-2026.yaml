  confidence: medium

# Note fiscale GE PP
note_fiscale: >
  Genève a l'un des ICC PP les plus élevés de Suisse (jusqu'à 18% de taux marginal sur base).
  L'impôt de base calculé avec ce barème est multiplié par le coefficient annuel (loi annuelle).
  Les communes genevoises ne perçoivent PAS d'impôt séparé : l'impôt communal est inclus dans
  l'ICC cantonal (système unifié GE, contrairement à VS/VD/FR).
  Taux effectif moyen ICC GE PP pour revenu 100k CHF : ~15-16% (parmi les plus élevés CH).
