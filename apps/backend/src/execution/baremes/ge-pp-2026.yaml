# Art. 41 al. 2 — Tarif marié (personnes mariées vivant en ménage commun)
# GE applique un splitting à 50% : le taux est celui correspondant à 50% du revenu combiné.
# Source : silgeneve.ch Art. 41 al. 2 LIPP-GE — confirmé S36 via WebFetch silgeneve.ch
tarif_married:
  methode: splitting_50pct
  rule: >
    Art. 41 al. 2 LIPP-GE : "Pour les époux vivant en ménage commun, le taux appliqué
    à leur revenu est celui qui correspond à 50% de ce dernier."
    Calcul : revenu_combiné / 2 → taux depuis tarif_single → impôt = taux × revenu_combiné.
  source: "Art. 41 al. 2 LIPP-GE — RSG D 3 08, confirmé silgeneve.ch S36"
  source_confidence: high
  note: >
    Pas de barème tabulaire séparé pour les mariés : GE utilise un splitting pur à 50%.
    Le tarif_single ci-dessus s'applique au revenu divisé par 2 pour déterminer le taux.
    Dette S35 résolue S36 — confirmation officielle via silgeneve.ch Art. 41 al. 2.

