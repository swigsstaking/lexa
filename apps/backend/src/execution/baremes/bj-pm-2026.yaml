# Barème ICC Jura bernois (canton de Berne) — Personnes Morales 2026
# Source : Loi sur les impôts du canton de Berne (LIMP-BE — RSB 661.11)
#   - Taux ICC PM bénéfice : 18.6% (cantonal BE + commune moyen Jura bernois)
#   - Taux ICC PM capital : 0.30‰ des fonds propres imposables
#   - IFD : 8.5% flat fédéral (art. 68 LIFD RS 642.11) — non inclus dans ICC
# BJ = communes francophones du canton de Berne (Jura bernois + région de Bienne)
# Ingéré dans Qdrant : Bareme-BJ-PM-2026

canton: BJ
year: 2026
entity: PM
