  law: "Loi sur les impôts du canton de Berne (LIMP-BE — RSB 661.11)"
  articles:
    - "LIMP-BE RSB 661.11 — Impôt bénéfice PM (SA/Sàrl/SC) cantonal"
    - "LIMP-BE RSB 661.11 — Impôt capital PM (SA/Sàrl/SC)"
    - "LIMP-BE RSB 661.11 — Centimes additionnels communaux PM"
    - "LIMP-BE RSB 661.11 — Exonération associations/fondations d'utilité publique"
  url: "https://www.taxinfo.sv.fin.be.ch/taxinfo/display/taxinfoch/Juristische+Personen"
  document: "LIMP-BE RSB 661.11 — Impôts PM bénéfice et capital"
