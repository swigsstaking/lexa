  note: >
    Taux approximatifs issus de pmTaxEstimator.ts (Session 33) — basés sur LIMP-BE RSB 661.11.
    Confidence=medium car les articles exacts LIMP-BE PM ne sont pas encore ingérés dans swiss_law.
    BJ = communes francophones de Berne (Courtelary, La Neuveville, Moutier ex-BJ, Tavannes, etc.).
    Moutier a quitté BJ pour rejoindre le canton du Jura au 1er janvier 2021.
