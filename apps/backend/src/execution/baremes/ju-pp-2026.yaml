# Note fiscale JU PP
note_fiscale: >
  Jura : taux effectif ICC PP moyen pour revenu 80k CHF ≈ 11-14% (impôt cantonal).
  Coefficient cantonal fixe 2026 : 240% du barème de base.
  Pas de coefficient communal séparé : le coefficient 240% intègre canton + commune en JU.
  Taux global ICC JU estimé ≈ 33.8% pour les revenus moyens-hauts.
  SCCJ publie le barème officiel annuellement — contacter SCCJ pour données exactes.
  Note : Moutier est intégrée au canton du Jura depuis le 1er janvier 2021.
